when:
  - event:
      - push
      - pull_request

steps:
  - name: build
    image: woodpeckerci/plugin-kaniko
    settings:
      target: builder
      cache: true
      tags: latest
      registry: reg.zyner.org
      repo: internal/templater/build
      username:
        from_secret: registry-username
      password:
        from_secret: registry-password
  - name: test
    image: reg.zyner.org/internal/templater/build:latest
    environment:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-Dwarnings"
    commands:
      - cargo test --release
      - cargo clippy --release

  - name: tags
    image: ghcr.io/dvjn/woodpecker-docker-tags-plugin
    settings:
      tags: |
        edge -v latest
        pr
        sha
  - name: publish
    image: woodpeckerci/plugin-kaniko
    settings:
      cache: true
      registry: reg.zyner.org
      repo: internal/templater
      username:
        from_secret: registry-username
      password:
        from_secret: registry-password
