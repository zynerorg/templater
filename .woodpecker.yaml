when:
  - event: push
    branch: main

matrix:
  include:
    - OCI_TAG: latest
      BASE_IMAGE: scratch
    - OCI_TAG: latest-alpine
      BASE_IMAGE: alpine:3.21

steps:
  - name: test
    image: rust:1.85-alpine3.21
    environment:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-Dwarnings"
    commands:
      - apk add --no-cache build-base
      - rustup component add clippy
      - cargo check
      - cargo test
      - cargo clippy

  - name: publish
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: reg.zyner.org
      repo: internal/templater
      tags: ${OCI_TAG}
      build_args:
        - BASE_IMAGE=${BASE_IMAGE}
      username:
        from_secret: registry-username
      password:
        from_secret: registry-password
