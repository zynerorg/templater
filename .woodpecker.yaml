when:
  - event: push
    branch: main

steps:
  - name: test
    image: rust:1.85-alpine3.21
    environment:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-Dwarnings"
    commands:
      - apk add --no-cache build-base
      - rustup component add clippy
      - cargo check
      - cargo test
      - cargo clippy

  - name: publish
    image: quay.io/woodpeckerci/plugin-kaniko
    settings:
      auto_tag: true
      registry: reg.zyner.org
      repo: internal/templater
      username:
        from_secret: registry-username
      password:
        from_secret: registry-password
